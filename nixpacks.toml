# Nixpacks (Railway y otros) — Next.js Volley-Schedule
# https://nixpacks.com/docs/configuration/file

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
# `npm install` tolerates a lockfile slightly behind package.json; `npm ci` fails the whole build if they differ.
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
